version: "3.8"

services:
  archivist:
    build: .
    ports:
      - "3100:3100"
    environment:
      - QDRANT_URL=http://qdrant:6333
      - SQLITE_PATH=/data/archivist/graph.db
      - MEMORY_ROOT=/data/memories
      - LLM_URL=${LLM_URL:-http://host.docker.internal:4000}
      - LLM_MODEL=${LLM_MODEL:-gpt-4o-mini}
      - LLM_API_KEY=${LLM_API_KEY}
      - EMBED_URL=${EMBED_URL:-http://host.docker.internal:4000}
      - EMBED_MODEL=${EMBED_MODEL:-text-embedding-v3}
      - VECTOR_DIM=${VECTOR_DIM:-1024}
      - RERANK_ENABLED=${RERANK_ENABLED:-false}
      - RETRIEVAL_THRESHOLD=${RETRIEVAL_THRESHOLD:-0.65}
      - NAMESPACES_CONFIG_PATH=/data/archivist/config/namespaces.yaml
    volumes:
      - archivist-data:/data
      - ${MEMORY_DIR:-./sample-memories}:/data/memories:ro
    depends_on:
      qdrant:
        condition: service_healthy
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-storage:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

volumes:
  archivist-data:
  qdrant-storage:
