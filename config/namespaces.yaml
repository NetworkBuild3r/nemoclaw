# Archivist namespaces: GitOps fleet + AHEAD Palo Alto demo (memory-as-message-bus).
# Mount: stack/docker-compose.override.yml -> /data/archivist/config/namespaces.yaml
# Restart archivist after edits: docker compose restart archivist

namespaces:
  - id: deployer
    read: ["all"]
    write: ["deployer", "releaser", "kubekate", "argo"]
    consistency: eventual
    ttl_days: 60

  - id: pipeline
    read: ["all"]
    write: ["pipeline", "releaser", "gitbob", "grafgreg"]
    consistency: eventual
    ttl_days: 90

  - id: releaser
    read: ["all"]
    write: ["releaser"]
    consistency: session

  - id: curator
    read: ["curator"]
    write: ["curator"]
    consistency: strong
    ttl_days: null

  - id: chief
    read: ["all"]
    write: ["chief"]
    consistency: session
    ttl_days: null

  # --- AHEAD demo: task bus + capability build + firewall ops ---
  - id: tasks
    read: ["all"]
    write: ["ahead-chief", "chief"]
    consistency: eventual
    ttl_days: 30

  - id: mcp-engineering
    read: ["all"]
    write: ["mcp-builder"]
    consistency: eventual
    ttl_days: 60

  - id: skills-research
    read: ["all"]
    write: ["researcher", "skill-author"]
    consistency: eventual
    ttl_days: 90

  - id: skill-engineering
    read: ["all"]
    write: ["skill-builder"]
    consistency: eventual
    ttl_days: 90

  - id: firewall-ops
    read: ["all"]
    write: ["palo-expert"]
    consistency: eventual
    ttl_days: 60

agent_namespaces:
  chief: chief
  gitbob: pipeline
  argo: deployer
  kubekate: deployer
  grafgreg: pipeline
  deployer: deployer
  pipeline: pipeline
  releaser: releaser
  curator: curator
  ahead-chief: tasks
  mcp-builder: mcp-engineering
  researcher: skills-research
  skill-author: skills-research
  skill-builder: skill-engineering
  palo-expert: firewall-ops
