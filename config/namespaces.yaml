# Archivist namespaces: GitOps fleet + AHEAD Palo Alto demo (memory-as-message-bus).
# Mount: stack/docker-compose.override.yml -> /data/archivist/config/namespaces.yaml
# Restart archivist after edits: docker compose restart archivist

namespaces:
  - id: deployer
    read: ["all"]
    write: ["deployer", "releaser", "kubekate"]
    consistency: eventual
    ttl_days: 60

  - id: pipeline
    read: ["all"]
    write: ["pipeline", "releaser", "gitbob", "grafgreg"]
    consistency: eventual
    ttl_days: 90

  - id: releaser
    read: ["all"]
    write: ["releaser"]
    consistency: session

  - id: curator
    read: ["curator"]
    write: ["curator"]
    consistency: strong
    ttl_days: null

  - id: chief
    read: ["all"]
    write: ["chief"]
    consistency: session
    ttl_days: null

  # --- AHEAD demo: task bus + capability build + firewall ops ---
  - id: tasks
    read: ["all"]
    write: ["ahead-chief", "chief"]
    consistency: eventual
    ttl_days: 30

  - id: mcp-engineering
    read: ["all"]
    write: ["mcp-builder"]
    consistency: eventual
    ttl_days: 60

  # Retired for skill-builder: skills ship in git (openclaw-skills/) only — no Archivist bodies.
  - id: skills-research
    read: ["all"]
    write: []
    consistency: eventual
    ttl_days: 90

  - id: skill-engineering
    read: ["all"]
    write: []
    consistency: eventual
    ttl_days: 90

  - id: firewall-ops
    read: ["all"]
    write: ["palo-expert"]
    consistency: eventual
    ttl_days: 60

  - id: change-control
    read: ["all"]
    write: ["snow-birdman", "chief"]
    consistency: eventual
    ttl_days: 90

agent_namespaces:
  chief: chief
  gitbob: pipeline
  kubekate: deployer
  grafgreg: pipeline
  deployer: deployer
  pipeline: pipeline
  releaser: releaser
  curator: curator
  ahead-chief: tasks
  mcp-builder: mcp-engineering
  # Default Archivist context: read assignment briefs in `tasks` (writes still chief/ahead-chief only).
  skill-builder: tasks
  palo-expert: firewall-ops
  snow-birdman: change-control
